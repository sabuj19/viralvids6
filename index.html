<title>Continue</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
}

.btn{
    display:inline-flex;
    align-items:center;
    gap:15px;
    text-decoration:none;
    background:#ff2d20;
    color:#fff;
    padding:22px 55px;
    font-size:34px;
    font-weight:700;
    border-radius:70px;
    box-shadow:0 10px 35px rgba(255,45,32,.35);
    transition:.25s;
    animation:pulse 1.5s infinite;
}

.btn:hover{
    transform:scale(1.06);
}

.arrow{
    width:55px;
    height:55px;
    background:#fff;
    color:#ff2d20;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:bold;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.06);}
    100%{transform:scale(1);}
}
</style>
