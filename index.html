<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:Arial, Helvetica, sans-serif;
}

.btn{
    width:100%;
    max-width:420px;
    text-decoration:none;
    background:#ff2d20;
    color:#fff;
    border-radius:60px;
    padding:18px 22px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    font-size:clamp(18px,4vw,28px);
    font-weight:700;

    box-shadow:0 10px 30px rgba(255,45,32,.35);
    transition:.25s;
    animation:pulse 1.5s infinite;
}

.btn:hover{
    transform:scale(1.03);
}

.arrow{
    width:50px;
    height:50px;
    min-width:50px;
    background:#fff;
    color:#ff2d20;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.03);}
    100%{transform:scale(1);}
}

@media(max-width:480px){
    .btn{
        padding:16px 18px;
        font-size:20px;
        border-radius:50px;
    }

    .arrow{
        width:42px;
        height:42px;
        min-width:42px;
        font-size:20px;
    }
}
</style>
